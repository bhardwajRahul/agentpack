name: Mirror to Codeberg

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main and tags to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          token="$(printf '%s' "$CODEBERG_TOKEN" | tr -d '[:space:]')"
          if [ -z "$token" ]; then
            echo "CODEBERG_TOKEN secret is empty" >&2
            exit 1
          fi
          auth="$(printf 'ihorponom:%s' "$token" | base64 | tr -d '\n')"
          url="https://codeberg.org/ihorponom/agentpack.git"
          git fetch --quiet origin main
          git -c http.extraheader="Authorization: Basic ${auth}" push --force "$url" "origin/main:refs/heads/main"
          git -c http.extraheader="Authorization: Basic ${auth}" push "$url" --tags
