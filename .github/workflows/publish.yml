name: Publish to npm

# Two triggers:
#   - release: published — fires when a GitHub Release is published. Use this
#     for the normal flow after a separate version-bump commit and tag push,
#     followed by `gh release create vX.Y.Z`.
#   - workflow_dispatch — manual "Run workflow" button in the Actions tab.
#     Useful as a fallback if a Release publish fires but Actions was paused,
#     or to re-attempt a failed publish without bumping the version.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run only (no actual publish)'
        type: boolean
        default: false

# Permissions required for npm Trusted Publishing via GitHub OIDC.
# id-token: write   → lets the runner request a short-lived OIDC token that
#                     npm verifies against the configured Trusted Publisher.
# contents: read    → checkout the repo at the released tag.
permissions:
  id-token: write
  contents: read

# Prevent two publish runs from racing each other if a Release is edited.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
          # npm Trusted Publishing requires npm 11.5.1+ and must not use an
          # npm token. Node 24 ships a new enough npm without self-upgrading
          # npm while it is running.

      - name: Verify npm version
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ github.event.release.tag_name }}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check ok: $PKG_VERSION"

      - name: Publish (dry-run)
        if: ${{ inputs.dry-run == true }}
        run: npm publish --dry-run --access public

      - name: Publish
        if: ${{ inputs.dry-run != true }}
        run: npm publish --access public

      # MCP Registry metadata update. Runs after a successful npm publish so the
      # registry's package validation can see the new version. GitHub OIDC only,
      # no stored tokens; server.json version is synced from package.json.
      - name: Install mcp-publisher
        if: ${{ inputs.dry-run != true }}
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version
        if: ${{ inputs.dry-run != true }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node -e "
            const { readFileSync, writeFileSync } = require('fs');
            const server = JSON.parse(readFileSync('server.json', 'utf8'));
            server.version = '$VERSION';
            for (const pkg of server.packages) pkg.version = '$VERSION';
            writeFileSync('server.json', JSON.stringify(server, null, 2) + '\n');
          "

      - name: Publish to MCP Registry
        if: ${{ inputs.dry-run != true }}
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
